interface:
  display_name: "Plugin Creator"
  short_description: "Scaffold plugins and marketplace entries"
  default_prompt: "Use $plugin-creator to scaffold a plugin with placeholder plugin.json, optional structure, and a marketplace.json entry. Use $plugin-sideload next when the user wants to install the local plugin into the temporary Codex cache for testing."
  icon_small: "./assets/plugin-creator-small.svg"
  icon_large: "./assets/plugin-creator.png"
