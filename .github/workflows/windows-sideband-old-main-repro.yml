name: Windows Sideband Old Main Repro

on:
  push:
    branches:
      - pakrym/repro-old-main-sideband-windows-targeted
  workflow_dispatch:

concurrency:
  group: windows-sideband-old-main-repro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bazel-windows-cross-sideband:
    name: Bazel Windows cross sideband repro
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare Bazel CI
        uses: ./.github/actions/prepare-bazel-ci
        with:
          target: x86_64-pc-windows-gnullvm
          cache-scope: bazel-windows-sideband-old-main-repro
          install-test-prereqs: "true"

      - name: Run exact Bazel Windows cross sideband test
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          ./.github/scripts/run-bazel-ci.sh \
            --print-failed-action-summary \
            --print-failed-test-logs \
            --windows-cross-compile \
            --remote-download-toplevel \
            -- \
            test \
            --nocache_test_results \
            --test_output=all \
            --test_sharding_strategy=disabled \
            --runs_per_test=5 \
            --test_timeout=300 \
            --test_verbose_timeout_warnings \
            --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
            --build_metadata=TAG_repro=old_main_sideband_windows \
            --test_arg=suite::realtime_conversation::conversation_webrtc_sideband_connect_failure_closes_with_error \
            --test_arg=--exact \
            --test_arg=--nocapture \
            -- \
            //codex-rs/core:core-all-test-windows-cross
