      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: nextest@0.9.103

      - name: Download nextest archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-arm64-nextest-archive
          path: ${{ runner.temp }}/windows-arm64-nextest-archive

      - name: tests
        id: test
        shell: bash
        run: |
          set -euo pipefail
          archive_file="${RUNNER_TEMP}/windows-arm64-nextest-archive/${WINDOWS_ARM64_ARCHIVE_FILE}"
          workspace_root="$(pwd)"
          extract_dir="${RUNNER_TEMP}/nextest-extract${{ matrix.partition_suffix }}"
          if [[ "${RUNNER_OS}" == "Windows" ]] && command -v cygpath >/dev/null 2>&1; then
            archive_file="$(cygpath -w "${archive_file}")"
            workspace_root="$(cygpath -w "${workspace_root}")"
            extract_dir="$(cygpath -w "${extract_dir}")"
          fi
          nextest_args=(
            --no-fail-fast
            --archive-file "${archive_file}"
            --workspace-remap "${workspace_root}"
            --extract-to "${extract_dir}"
            --extract-overwrite
          )
          if [[ -n "${WINDOWS_NEXTEST_THREADS}" ]]; then
            nextest_args+=(--test-threads "${WINDOWS_NEXTEST_THREADS}")
          fi
          if [[ -n "${NEXTEST_PARTITION}" ]]; then
            nextest_args+=(--partition "${NEXTEST_PARTITION}")
          fi
          cargo nextest run "${nextest_args[@]}"
        env:
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "8388608" # 8 MiB
          NEXTEST_STATUS_LEVEL: leak
          NEXTEST_PARTITION: ${{ matrix.nextest_partition }}

      - name: verify tests passed
        if: steps.test.outcome == 'failure'
        run: |
          echo "Tests failed. See logs for details."
          exit 1

  # --- Gatherer job for the full post-merge workflow --------------------------
  results:
    name: Full CI results
    needs:
      [
        general,
        cargo_shear,
        argument_comment_lint_package,
        argument_comment_lint_prebuilt,
        lint_build,
        test_matrix,
        tests,
        windows_arm64_test_archive,
        windows_arm64_archive_tests,
      ]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Summarize
        shell: bash
        run: |
          echo "argpkg : ${{ needs.argument_comment_lint_package.result }}"
          echo "arglint: ${{ needs.argument_comment_lint_prebuilt.result }}"
          echo "general: ${{ needs.general.result }}"
          echo "shear  : ${{ needs.cargo_shear.result }}"
          echo "lint   : ${{ needs.lint_build.result }}"
          echo "matrix : ${{ needs.test_matrix.result }}"
          echo "tests  : ${{ needs.tests.result }}"
          echo "archive: ${{ needs.windows_arm64_test_archive.result }}"
          echo "armins : ${{ needs.windows_arm64_archive_tests.result }}"
          [[ '${{ needs.argument_comment_lint_package.result }}' == 'success' ]] || { echo 'argument_comment_lint_package failed'; exit 1; }
          [[ '${{ needs.argument_comment_lint_prebuilt.result }}' == 'success' ]] || { echo 'argument_comment_lint_prebuilt failed'; exit 1; }
          [[ '${{ needs.general.result }}' == 'success' ]] || { echo 'general failed'; exit 1; }
          [[ '${{ needs.cargo_shear.result }}' == 'success' ]] || { echo 'cargo_shear failed'; exit 1; }
          [[ '${{ needs.lint_build.result }}' == 'success' ]] || { echo 'lint_build failed'; exit 1; }
          [[ '${{ needs.test_matrix.result }}' == 'success' ]] || { echo 'test_matrix failed'; exit 1; }
          [[ '${{ needs.tests.result }}' == 'success' ]] || { echo 'tests failed'; exit 1; }
          if [[ '${{ needs.test_matrix.outputs.windows_arm64_archive }}' == 'true' ]]; then
            [[ '${{ needs.windows_arm64_test_archive.result }}' == 'success' ]] || { echo 'windows_arm64_test_archive failed'; exit 1; }
            [[ '${{ needs.windows_arm64_archive_tests.result }}' == 'success' ]] || { echo 'windows_arm64_archive_tests failed'; exit 1; }
          else
            [[ '${{ needs.windows_arm64_test_archive.result }}' == 'skipped' ]] || { echo 'windows_arm64_test_archive unexpectedly ran'; exit 1; }
            [[ '${{ needs.windows_arm64_archive_tests.result }}' == 'skipped' ]] || { echo 'windows_arm64_archive_tests unexpectedly ran'; exit 1; }
          fi

      - name: sccache summary note
        if: always()
        run: |
          echo "Per-job sccache stats are attached to each matrix job's Step Summary."
