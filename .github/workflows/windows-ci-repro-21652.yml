name: Windows CI Repro 21652

on:
  push:
    branches:
      - pakrym/windows-ci-repro-21652
  workflow_dispatch:

concurrency:
  group: windows-ci-repro-21652-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-windows-x64-sandbox-pwsh:
    name: Cargo Windows x64 sandbox PowerShell repro
    runs-on:
      group: codex-runners
      labels: codex-windows-x64
    timeout-minutes: 30
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: x86_64-pc-windows-msvc

      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: nextest
          version: 0.9.103

      - name: Run timed-out tests with nextest
        shell: bash
        env:
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "8388608"
          NEXTEST_STATUS_LEVEL: leak
        run: |
          cargo nextest run \
            --no-fail-fast \
            -p codex-windows-sandbox \
            --target x86_64-pc-windows-msvc \
            --cargo-profile ci-test \
            --timings \
            session::tests::legacy_capture_powershell_emits_output
